name: Sync main to public (GitHub Pages)

# Pages is configured to deploy from the `public` branch, not `main`.
# This keeps that setting as-is and just mirrors main -> public on every
# push, so nobody has to remember to run `git push origin main:public` by hand.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Push main to public
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin HEAD:public --force
