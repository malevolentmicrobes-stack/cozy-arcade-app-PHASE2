<script id="v175151-true-drop-js">
(function(){
  const DROP_MS = 7000;
  let raf = null;
  let dropStart = 0;
  let currentDropY = 0;
  let dropDistance = 360;
  let startTop = 255;

  function q(id){ return document.getElementById(id); }
  function revealVisible(){ const r=q('soloReveal'); return r && !r.classList.contains('hidden'); }
  function safeClear(){ try{ clearInterval(ticker); }catch(e){} if(raf) cancelAnimationFrame(raf); raf=null; }
  function selectedIdx(){ try{return Math.max(0,Math.min(3,Number(selected)||0));}catch(e){return 0;} }
  function calcGeometry(){
    const p=q('soloPrompt') || document.querySelector('#solo .promptBox');
    const pb = p ? p.getBoundingClientRect() : {bottom:250};
    // Starts immediately under the prompt, i.e. the red-outlined field from the screenshots.
    startTop = Math.max(188, Math.min(window.innerHeight*0.39, pb.bottom + 16));
    // Ends in the lower playable space above the character/footer.
    const endTop = Math.max(startTop + 180, Math.min(window.innerHeight - 205, window.innerHeight*0.72));
    dropDistance = Math.max(190, endTop - startTop);
    const row=q('choiceRow');
    if(row){ row.style.setProperty('--soloDropStartTop', Math.round(startTop)+'px'); }
    const warn=q('soloDropWarn175151');
    if(warn){ warn.style.setProperty('--soloDropStartTop', Math.round(startTop)+'px'); }
  }
  function setDropY(y){
    currentDropY = y;
    const row=q('choiceRow');
    if(row){ row.style.setProperty('--soloDropY', Math.round(y)+'px'); }
  }

    try{[...document.querySelectorAll('#choiceRow .choice')].forEach((d,i)=>d.classList.toggle('selected',i===selected));}catch(e){}
    try{ moveHunter(); }catch(e){}
  }
  function tick(now){
    if(mode !== 'solo' || revealVisible()){ raf=null; return; }
    if(paused){ raf=requestAnimationFrame(tick); return; }
    if(!dropStart) dropStart=now;
    const elapsed = now - dropStart;
    const p = Math.max(0, Math.min(1, elapsed / DROP_MS));
    setDropY(p * dropDistance);
    timerMax = parseInt(localStorage.getItem('cozyQuestionSeconds351')||7)||7;
    timer = Math.max(0, timerMax * (1 - p));
    const row=q('choiceRow');
    if(row){ row.classList.toggle('warning', elapsed >= DROP_MS - 3000); }
    const warn=q('soloDropWarn175151');
    if(warn){
      const show = elapsed >= DROP_MS - 3000;
      warn.classList.toggle('on', show);
      warn.textContent = show ? ('AUTO-SELECT IN ' + Math.ceil(timer)) : '';
    }
    try{ q('soloTimerFill').style.width = Math.max(0,(1-p)*100)+'%'; }catch(e){}
    syncSelected();
    if(elapsed >= DROP_MS){

      if(typeof autoSelect==='undefined' || autoSelect) selectSolo(selectedIdx());

    if(row){

  }

  // Full replacement for Solo render: rebuild the same visual card, then start the true top-to-bottom drop.
  window.renderSolo = renderSolo = function(){
    document.body.className='';
    q('soloScore').textContent=score;
    q('soloStreak').textContent=streak;
    q('soloGate').textContent=gate;
    try{q('hpFill').style.width=hp+'%';}catch(e){}
    q('soloSystem').textContent=current.system||current.sys||'';
    q('soloQuestion').innerHTML=(window.bionic||bionic)(getPrompt(current));
    q('soloReveal').classList.add('hidden');
    let row=q('choiceRow');
    row.innerHTML='';
    row.className='choiceRow v175151-drop';
    choices.forEach((ch,i)=>{
      let d=document.createElement('button');
      d.className='choice '+(i===selected?'selected':'');
      d.innerHTML=`<span class="letter">${'ABCD'[i]}</span>${escHTML(ch)}`;
      d.onclick=()=>selectSolo(i);
      row.appendChild(d);
    });
    if(!q('soloDropWarn175151')){
      const w=document.createElement('div');
      w.id='soloDropWarn175151';
      (q('solo')||document.body).appendChild(w);
    }
    syncSelected();
    startDrop();
  };

  // Selection freezes the row exactly where it is and reveals the learning card.
  window.selectSolo = selectSolo = function(i){
    if(!q('soloReveal').classList.contains('hidden')) return;

    const row=q('choiceRow'); if(row) row.classList.remove('warning');
    const warn=q('soloDropWarn175151'); if(warn){ warn.classList.remove('on'); warn.textContent=''; }
    const ok=choices[i]===clean(current.diagnosis);
    [...document.querySelectorAll('#choiceRow .choice')].forEach((d,j)=>{
      if(choices[j]===clean(current.diagnosis)) d.classList.add('correct');

  const toastSafe=msg=>{try{toast(msg)}catch(e){console.log(msg)}};
  function parseCSV175158(text){
    const rows=[]; let row=[], cell='', q=false;

      const ch=text[i], nx=text[i+1];

<script id="v1751514-home-domain-slash-js">
(function(){
  const $ = id => document.getElementById(id);
  const stateForSafe = (c)=>{ try{return state?.[c.id||c.qid] || {}}catch(e){return {}} };

  function reorderHome(){
    const home = document.querySelector('#home .homeWrap'); if(!home) return;
    const panel = $('homePlayPanel175155');
    const mode = home.querySelector(':scope > .modeGrid');
    const kpis = home.querySelector(':scope > .kpis');
    const controls = home.querySelector(':scope > .controls');
    if(panel && mode && panel.previousElementSibling !== mode) mode.after(panel);
    let order = document.querySelector('#home .reviewOrderWrapFinal');
    if(order && panel && order.previousElementSibling !== panel) panel.after(order);
    if(kpis){ if(order && kpis.previousElementSibling !== order) order.after(kpis); else if(panel && !order && kpis.previousElementSibling !== panel) panel.after(kpis); }
    if(controls && kpis && controls.previousElementSibling !== kpis) kpis.after(controls);
  }

  function addNewCardsOption(){
    const sel = $('homeScope175155'); if(!sel) return;
    if(![...sel.options].some(o=>o.value==='new')){
      const opt = document.createElement('option');
      opt.value = 'new'; opt.textContent = 'New cards — not reviewed';
      const review = [...sel.options].find(o=>o.value==='review');
      if(review) sel.insertBefore(opt, review); else sel.appendChild(opt);
    }
  }

  // Extend the home review filters without breaking existing import/export behavior.
  const oldCardPool = window.cardPool || (typeof cardPool !== 'undefined' ? cardPool : null);
  if(oldCardPool){
    window.cardPool = cardPool = function(){
      let arr = oldCardPool();
      try{
        const f = window.homeFilters || {};
        if(f.scope === 'new' && Array.isArray(arr)) arr = arr.filter(c=>!stateForSafe(c).seen);
      }catch(e){}
      return (arr && arr.length) ? arr : oldCardPool();
    };
  }

  function installHome(){
    addNewCardsOption();
    reorderHome();
    const sel = $('homeScope175155');
    if(sel){
      sel.onchange = (e)=>{ window.homeFilters = window.homeFilters || {}; window.homeFilters.scope = e.target.value; };
    }
  }
  document.addEventListener('DOMContentLoaded',()=>{setTimeout(installHome,0);setTimeout(installHome,250);setTimeout(installHome,800);});
  if(document.readyState!=='loading') {setTimeout(installHome,0);setTimeout(installHome,250);}

  // Fruit Ninja / slash mechanics for Knowledge Expansion. Pointer hover/click now selects by collision with orbs.
  let slashDown = false;
  let slashLockedUntil = 0;
  let last = null;
  function domainActive(){return mode==='domain' && $('domain') && !$('domain').classList.contains('hidden') && $('domainReveal')?.classList.contains('hidden');}
  function slashLine(x1,y1,x2,y2){
    const len = Math.hypot(x2-x1,y2-y1); if(len < 8) return;
    const el = document.createElement('i'); el.className='domainSlash1751514';
    el.style.left = x1+'px'; el.style.top = y1+'px'; el.style.width = len+'px';
    el.style.transform = 'rotate('+Math.atan2(y2-y1,x2-x1)+'rad)';
    document.body.appendChild(el); setTimeout(()=>el.remove(),420);
  }
  function pointNearOrb(x,y,orb){
    const r = orb.getBoundingClientRect();
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    const rx = Math.max(44,r.width*.58), ry = Math.max(32,r.height*.62);
    return (((x-cx)*(x-cx))/(rx*rx) + ((y-cy)*(y-cy))/(ry*ry)) <= 1;
  }
  function checkSlashHit(x,y,force=false){
    if(!domainActive()) return;
    const orbs = [...document.querySelectorAll('#orbArena .orb')];
    let hit = -1;
    orbs.forEach((orb,i)=>{
      const near = pointNearOrb(x,y,orb);
      orb.classList.toggle('slashHover1751514', near);
      if(hit<0 && near) hit = Number(orb.dataset.idx ?? i);
    });
    if(hit>=0 && (force || slashDown || (last && Math.hypot(x-last.x,y-last.y)>13)) && Date.now()>slashLockedUntil){
      slashLockedUntil = Date.now()+700;
      try{ selectDomain(hit); }catch(e){}
    }
  }
  window.addEventListener('pointerdown',e=>{ if(!domainActive()) return; slashDown=true; last={x:e.clientX,y:e.clientY}; checkSlashHit(e.clientX,e.clientY,true); }, true);
  window.addEventListener('pointerup',()=>{ slashDown=false; last=null; }, true);
  window.addEventListener('pointermove',e=>{
    if(!domainActive()) return;
    if(last) slashLine(last.x,last.y,e.clientX,e.clientY);
    checkSlashHit(e.clientX,e.clientY,false);
    last={x:e.clientX,y:e.clientY};
  }, true);
})();
</script>

  }

<script id="v17524-settings-return-js">
(function(){
  function q(id){return document.getElementById(id)}
  function visible(id){const el=q(id); return !!el && !el.classList.contains('hidden')}
  function currentScreen(){
    if(visible('solo')) return 'solo';
    if(visible('domain')) return 'domain';
    if(visible('review')) return 'review';
    return 'home';
  }
  window.__settingsReturnScreen = window.__settingsReturnScreen || 'home';

  // Remember the exact screen before settings opens, including gear/settings clicks.
  document.addEventListener('click', function(ev){
    const t = ev.target && ev.target.closest ? ev.target.closest('#settingsBtn,#gearBtn,.settingsGear') : null;
    if(t){ window.__settingsReturnScreen = currentScreen(); }
  }, true);

  function returnFromSettings(){
    const dest = window.__settingsReturnScreen || 'home';
    try{ if(typeof saveSpacing === 'function') saveSpacing(); }catch(e){}
    ['home','solo','domain','review','settings','pause','modal','end','notify'].forEach(id=>{ const el=q(id); if(el) el.classList.add('hidden'); });
    if(dest==='solo' && q('solo')){
      q('solo').classList.remove('hidden');
      try{ window.mode='solo'; mode='solo'; }catch(e){}
      try{ window.paused=false; paused=false; }catch(e){}
      try{ if(q('soloReveal')?.classList.contains('hidden') && typeof loopSolo==='function') loopSolo(); }catch(e){}
    } else if(dest==='domain' && q('domain')){
      q('domain').classList.remove('hidden');
      try{ window.mode='domain'; mode='domain'; }catch(e){}
      try{ window.paused=false; paused=false; }catch(e){}
      try{ if(q('domainReveal')?.classList.contains('hidden') && typeof loopDomain==='function') loopDomain(); }catch(e){}
    } else if(dest==='review' && q('review')){
      q('review').classList.remove('hidden');

    } else {
      try{ if(typeof home==='function') home(); else q('home')?.classList.remove('hidden'); }catch(e){ q('home')?.classList.remove('hidden'); }
    }
  }
  window.returnFromSettings17524 = returnFromSettings;

  function ensureReturnButton(){
    const settings=q('settings'); if(!settings) return;
    const box=settings.querySelector('.box') || settings;
    let controls=box.querySelector(':scope > .controls') || box.querySelector('.controls');
    if(!controls){ controls=document.createElement('div'); controls.className='controls'; box.appendChild(controls); }

  function wire(){

      const el=q(id); if(!el || el.dataset.v17524ReturnWired) return;
      const prev=el.onclick;

<script id="v17525-final-sizing-lock-js">
(function(){
  function classifyPromptBoxes(){
    document.querySelectorAll('.promptBox').forEach(function(box){
      var txt = box.querySelector('.promptText');
      if(!txt) return;
      var len = (txt.textContent || '').replace(/\s+/g,' ').trim().length;
      box.classList.toggle('long-prompt', len > 430);
      box.classList.toggle('very-long-prompt', len > 760);
      box.setAttribute('data-prompt-length', String(len));
      // Keep newly rendered prompts at the top of their own scroll container.
      if(box.dataset.lastPromptLen !== String(len)){
        box.scrollTop = 0;
        box.dataset.lastPromptLen = String(len);
      }
    });
  }
  window.__cozyFixPromptSizing = classifyPromptBoxes;
  var mo = new MutationObserver(classifyPromptBoxes);
  mo.observe(document.documentElement,{childList:true,subtree:true,characterData:true});
  ['DOMContentLoaded','load','resize','keyup','click'].forEach(function(ev){
    window.addEventListener(ev, function(){ setTimeout(classifyPromptBoxes, 0); }, true);
  });
  setInterval(classifyPromptBoxes, 500);
  classifyPromptBoxes();
})();
</script>

	  function stateFor(c){

	  function reviewedFor(c){const s=stateFor(c); return !!(s.seen||s.reviewed===true||Number(s.seen_count||0)>0||Number(s.reviewed||0)>0||Number(s.reviewed_count||0)>0||s.rating||s.last_rating||s.stage==='review'||s.stage==='learning'||s.stage==='relearning');}

  function shuffle350(arr){
    const out=[...arr];
    for(let i=out.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [out[i],out[j]]=[out[j],out[i]];}

  function dueScore350(c){
    const s=stateFor(c);
    const last=s.last?Date.parse(s.last):0;
    const age=last?Math.max(0,(Date.now()-last)/86400000):14;
    let n=0;
    if(!s.seen) n+=35;
    if(s.pinned) n+=120;
    if(s.rating==='again'||s.lastCorrect===false||s.wrong||s.missed) n+=100;
    if(s.rating==='hard') n+=70;
    if(s.rating==='good') n+=15;
    if(s.rating==='easy') n-=25;
    n+=Math.min(40,age*3);

      const sys=$('homeSystem175155')?.value||'all';

      if(sys&&sys!=='all') arr=arr.filter(c=>clean(c.system||c.sys||c.subject)===sys);
      if(tag&&tag!=='all') arr=arr.filter(c=>tagsOf(c).includes(tag));
      const scope=scopeValue();
      const launchTag=document.documentElement.dataset.cozyLaunchTag || '';
	      if(scope==='new') arr=arr.filter(newFor);

      if(scope==='pinned') arr=arr.filter(c=>stateFor(c).pinned);
      if(scope==='due') arr=[...arr].sort((a,b)=>dueScore350(b)-dueScore350(a));

        arr=(activeTag&&activeTag!=='all')?arr.filter(c=>tagsOf(c).includes(activeTag)):arr.filter(c=>tagsOf(c).length);

  function csvEscape351(v){
    const s=String(v==null?'':v);
    return s.includes('"')||s.includes(',')||s.includes('\n')||s.includes('\r')?'"'+s.replace(/"/g,'""')+'"':s;
  }

  function parseCsv351(text){
    const rows=[]; let row=[], cell='', q=false;
    for(let i=0;i<String(text||'').length;i++){
      const ch=text[i], next=text[i+1];
      if(q){
        if(ch=='"' && next=='"'){cell+='"'; i++;}
        else if(ch=='"') q=false;
        else cell+=ch;
      }else if(ch=='"') q=true;
      else if(ch===','){row.push(cell); cell='';}
      else if(ch==='\n'){row.push(cell); rows.push(row); row=[]; cell='';}
      else if(ch!=='\r') cell+=ch;
    }
    row.push(cell); rows.push(row);
    return rows.filter(r=>r.some(x=>String(x||'').trim()));
  }

  function cardsFromCsv351(text){
    const rows=parseCsv351(text);
    if(!rows.length) return [];
    const header=rows[0].map(h=>clean(h).toLowerCase());
    const hasHeader=header.some(h=>/presentation|diagnosis|objective|answer|prompt|system|tag/.test(h));
    const body=hasHeader?rows.slice(1):rows;
    const idx=nameList=>header.findIndex(h=>nameList.some(n=>h.includes(n)));
    const iPrompt=hasHeader?idx(['presentation','prompt','clinical_vignette']):0;
    const iDx=hasHeader?idx(['diagnosis','topic','choice','dx']):1;
    const iObj=hasHeader?idx(['educational_objective','objective','answer','quick_recall']):2;
    const iSys=hasHeader?idx(['system','subject','sys']):3;
    const iTags=hasHeader?idx(['tags','tag']):4;
    return body.map((r,i)=>{
      const presentation=r[iPrompt>=0?iPrompt:0]||'';
      const diagnosis=r[iDx>=0?iDx:1]||r[iObj>=0?iObj:2]||('Imported card '+(i+1));
      const educational_objective=r[iObj>=0?iObj:2]||presentation||diagnosis;
      const system=r[iSys>=0?iSys:3]||'Imported';
      const tags=String(r[iTags>=0?iTags:4]||system).split(/[;,|]/).map(clean).filter(Boolean);
      return {id:i+1,system,sys:system,diagnosis,presentation,quick_recall:educational_objective,educational_objective,board_trigger:'',tags};
    }).filter(c=>clean(c.diagnosis)&&clean(c.presentation||c.educational_objective));
  }

  function visibleOrbIndexByDirection351(dir){
    const orbs=[...document.querySelectorAll('#orbArena .orb')].filter(el=>el.offsetParent!==null);
    if(!orbs.length) return -1;
    const metrics=orbs.map((el,i)=>{
      const r=el.getBoundingClientRect();
      return {idx:Number(el.dataset.idx??i),x:r.left+r.width/2,y:r.top+r.height/2};
    });
    let pick=metrics[0];
    metrics.forEach(m=>{
      if(dir==='top' && m.y<pick.y) pick=m;
      if(dir==='bottom' && m.y>pick.y) pick=m;
      if(dir==='left' && m.x<pick.x) pick=m;
      if(dir==='right' && m.x>pick.x) pick=m;
    });
    return pick.idx;
  }

      .replace(/background-image:[^;]+;?/gi, '')

  function injectIfDrawerOpen() {
    const drawer = document.getElementById('cozySettingsDrawer351');
    if (drawer?.classList.contains('open')) addPromptAIPanel();
  }

  function watchDrawer() {
    const drawer = document.getElementById('cozySettingsDrawer351');
    if (!drawer || drawer.__v24PromptObserver) return;
    drawer.__v24PromptObserver = true;
    new MutationObserver(injectIfDrawerOpen).observe(drawer, { attributes: true, attributeFilter: ['class'] });
  }

  function watchDrawerCreation() {
    if (document.body.__v24DrawerCreationObserver) return;
    document.body.__v24DrawerCreationObserver = true;
    new MutationObserver(() => {
      watchDrawer();
      injectIfDrawerOpen();
    }).observe(document.body, { childList: true, subtree: true });
  }

  function stabilizeOneThingFlash() {
    document.querySelectorAll('.oneThing350').forEach(one => {
      if (one.querySelector('textarea')) return;
      if (!one.querySelector('[data-one-thing-action]')) {
        try {
          const card = typeof current !== 'undefined' ? current : null;
          if (card && typeof window.renderOneThingStable351 === 'function') window.renderOneThingStable351(one, card, false);
        } catch (_) {}
      }
    });
  }

  if (!window.__v24RevealWrapped) {
    window.__v24RevealWrapped = true;
    const _prior = window.reveal;
    if (typeof _prior === 'function') {
      window.reveal = reveal = function(which, ok) {

        if (ok === true) {

        }
        return out;
      };
    }
  }

})();

  function rateCard(cardId, rating) {
    const p = getProgress(cardId);
    if (rating === 'pin') {
      setProgress(cardId, { pinned: !p.pinned });
      return;
    }
    if (rating === 'bury') {
      setProgress(cardId, { buried: !p.buried, suspended: !p.buried });
      return;
    }

    const now = new Date();
    const isNew = !p.stability && !Number(p.interval_days || 0);
    const prevS = Number(p.stability) || Math.max(Number(p.interval_days || 0), 1);
    const prevD = Number(p.difficulty) || 5.0;
    const elapsedDays = p.last_seen_at ? (now - new Date(p.last_seen_at)) / 86400000 : 0;
    const Rv = (!isNew && p.last_seen_at) ? fsrsRetrievability(elapsedDays, prevS) : 1.0;
    let stage = p.stage || 'new';
    let lapses = Number(p.lapses || 0);
    let repair = false;
    let buried = false;
    let newS, newD, interval, nextDue;

    if (rating === 'again') {
      newS = isNew ? fsrsInitStability(rating) : fsrsForgetStability(prevD, prevS, Rv);
      newD = isNew ? fsrsInitDifficulty(rating) : fsrsUpdateDifficulty(prevD, rating);
      lapses += p.stage === 'review' ? 1 : 0;
      stage = 'relearning';
      interval = 0;
      repair = true;
      buried = false;
      nextDue = addMinutes(now, 10);
    } else if (rating === 'hard' || rating === 'good' || rating === 'easy') {
      newS = isNew ? fsrsInitStability(rating) : fsrsRecallStability(prevD, prevS, Rv, rating);
      newD = isNew ? fsrsInitDifficulty(rating) : fsrsUpdateDifficulty(prevD, rating);
      stage = 'review';
      interval = fsrsNextInterval(newS);
      repair = rating === 'hard';
      buried = true;
      nextDue = addDays(now, interval);
    } else {
      return;
    }

    session.seenThisSession.add(cardId);
    if (buried) session.buriedToday.add(cardId);
    const next = setProgress(cardId, {
      seen_count: Number(p.seen_count || 0) + 1,
      reviewed_count: Number(p.reviewed_count || 0) + 1,
      correct_count: Number(p.correct_count || 0) + (rating === 'good' || rating === 'easy' ? 1 : 0),
      wrong_count: Number(p.wrong_count || 0) + (rating === 'again' || rating === 'hard' ? 1 : 0),
      stage,
      last_rating: rating,
      last_seen_at: now.toISOString(),
      next_due_at: nextDue.toISOString(),
      interval_days: interval,
      ease_factor: 2.5,
      stability: newS,
      difficulty: newD,
      retrievability: Rv,
      lapses,
      repair_point: repair,
      buried: false,
      updated_at: now.toISOString()
    });
    if (rating === 'again') console.log('[SRS] again fired for', cardId, next);
    if(rating==='again'){session.seenThisSession.delete(cardId);try{if(Array.isArray(session.pool)){const _i=session.pool.findIndex(c=>canonicalCardId(c)===cardId);if(_i>0){const[_c]=session.pool.splice(_i,1);session.pool.unshift(_c);}else if(_i===-1&&window.cards){const _c=window.cards.find(c=>canonicalCardId(c)===cardId);if(_c)session.pool.unshift(_c);}}}catch(_){}}
  }

  function shuffleCards(arr) {
    const out = [...arr];
    const rand = () => {
      try { const data = new Uint32Array(1); crypto.getRandomValues(data); return data[0] / 4294967296; }
      catch (_) { return Math.random(); }
    };
    for (let i = out.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [out[i], out[j]] = [out[j], out[i]];
    }
    if (out.length > 1 && canonicalCardId(out[0]) === canonicalCardId(arr[0])) out.push(...out.splice(0, 1));
    return out;
  }

  function splitBuriedToBack(arr) {
    const active = [], buried = [];
    arr.forEach(card => {
      const id = canonicalCardId(card);
      const p = getProgress(id);

    });
    return active.concat(buried);
  }

	  function basePlayableCards() {
	    return normalizeDeckIdentities().filter(card => {
	      const p = progressForCard(card);

  function getStudyPool(mode, gameType) {
    const selected = normalizeMode(mode || selectedOrder(gameType));
    let arr = applyStudyFiltersPhase3(basePlayableCards());
    const progress = card => progressForCard(card);
    const dueSort = (a, b) => {
      const pa = progress(a), pb = progress(b);
      const ad = isDue(pa) ? 0 : 1;
      const bd = isDue(pb) ? 0 : 1;
      if (ad !== bd) return ad - bd;
      return String(pa.last_seen_at || '').localeCompare(String(pb.last_seen_at || ''));
    };

	    if (selected === 'new_only') {
	      arr = arr.filter(isNewCard);
	    } else if (selected === 'new_first') {
	      arr = [
	        ...arr.filter(isNewCard),
	        ...arr.filter(c => isDue(progress(c)) && isReviewedCard(c)),
	        ...arr.filter(c => !isDue(progress(c)) && progress(c).stage === 'relearning')
	      ];
	    } else if (selected === 'random_all') {
	      arr = shuffleCards(arr);
	    } else if (selected === 'random_new') {
	      arr = shuffleCards(arr.filter(isNewCard));
	    } else if (selected === 'reviewed_first') {
	      arr = [
	        ...arr.filter(c => isReviewedCard(c) && isDue(progress(c))).sort(dueSort),
	        ...arr.filter(isNewCard)
	      ];
    } else if (selected === 'due') {
      arr = arr.filter(c => { const p=progressForCard(c); return isDue(p) && !p.suspended && !p.buried && p.rating!=='bury' && p.last_rating!=='bury'; });
      arr = [...arr].sort((a, b) => {
        const ta = Date.parse(progress(a).next_due_at || '');
        const tb = Date.parse(progress(b).next_due_at || '');
        if (isNaN(ta) && isNaN(tb)) return 0;
        if (isNaN(ta)) return 1;
        if (isNaN(tb)) return -1;
        return ta - tb;
      });
	    } else if (selected === 'review_deck') {
	      arr = applyStudyFiltersPhase3(normalizeDeckIdentities()).filter(c => { const p=progressForCard(c); return !p.suspended && !p.buried && p.rating!=='bury' && p.last_rating!=='bury'; }).filter(c => {
	        const p = progressForCard(c);
	        return isReviewCandidate(c) && (p.pinned || isDue(p) || !hasFutureDue(p));
	      }).sort((a, b) => {
	        const pa = progress(a), pb = progress(b);
	        const score = p => (p.pinned ? 0 : p.repair_point ? 1 : 2);
        if (score(pa) !== score(pb)) return score(pa) - score(pb);
        return String(pa.last_seen_at || '').localeCompare(String(pb.last_seen_at || ''));
      });
      return arr;
    } else if (selected === 'pinned') {
      arr = arr.filter(c => progress(c).pinned);
	    } else if (selected === 'hard') {
	      arr = arr.filter(c => {
	        const p = progress(c);
	        return (p.repair_point || p.rating === 'hard' || p.rating === 'again');
	      });
    } else if (selected === 'tagged') {
      const tag = selectedTagPhase3();
      if (!tag || tag === 'all') arr = arr.filter(c => tagsForPhase3(c).length);
    } else if (selected === 'suspended') {
      arr = applyStudyFiltersPhase3(normalizeDeckIdentities()).filter(c => progressForCard(c).suspended);
    }

	    if (!arr.length && ['new_only', 'pinned', 'hard', 'tagged', 'suspended'].includes(selected)) return [];

    if (selected === 'random_new' && arr.length) {
      const active = arr.filter(c => !isSessionBlockedCard(c));
      return active.length ? active : arr;
    }
    const scheduledModes = ['new_first', 'reviewed_first', 'due', 'review_deck'];
    const ordered = splitBuriedToBack(arr.length || scheduledModes.includes(selected) ? arr : applyStudyFiltersPhase3(basePlayableCards()));
    const active = ordered.filter(c => {
      return !isSessionBlockedCard(c);
    });
    if (active.length) return active;
    if (ordered.length) return ordered;
    clearSessionBuried();
    if (scheduledModes.includes(selected)) {
      const refreshed = applyStudyFiltersPhase3(basePlayableCards());
      if (selected === 'new_first') {
        return [
          ...refreshed.filter(isNewCard),
          ...refreshed.filter(c => isDue(progress(c)) && isReviewedCard(c)),
          ...refreshed.filter(c => !isDue(progress(c)) && progress(c).stage === 'relearning')
        ];
      }
      if (selected === 'reviewed_first') {
        return [
          ...refreshed.filter(c => isReviewedCard(c) && isDue(progress(c))).sort(dueSort),
          ...refreshed.filter(isNewCard)
        ];
      }
	      if (selected === 'due') {
	        const dueOnly = refreshed.filter(c => { const p=progressForCard(c); return isDue(p) && !p.suspended && !p.buried && p.rating!=='bury' && p.last_rating!=='bury'; });
	        if (dueOnly.length) return dueOnly;
	        const pinnedFallback = refreshed.filter(c => { const p=progressForCard(c); return p && p.pinned && !p.suspended && !p.buried; });
	        return pinnedFallback;
	      }
      if (selected === 'review_deck') {
        return applyStudyFiltersPhase3(normalizeDeckIdentities()).filter(c => { const p=progressForCard(c); return !p.suspended && !p.buried && p.rating!=='bury' && p.last_rating!=='bury'; }).filter(c => {
          const p = progressForCard(c);
	          return isReviewCandidate(c) && (p.pinned || isDue(p) || !hasFutureDue(p));
        });
      }
    }
    const base = applyStudyFiltersPhase3(basePlayableCards())
      .filter(c => !session.seenThisSession.has(canonicalCardId(c)));
    return shuffleCards(base.length ? base : applyStudyFiltersPhase3(basePlayableCards()));
  }

  // canonicalizeCard — single source of truth for field normalization and export filtering.
  // mode:'export'  → allowlist only canonical source fields (strips all aliases, progress state, synthesized views)
  // mode:'display' → normalize aliases in-place, keep computed level_* views for gameplay
  function canonicalizeCard(raw, opts) {
    const mode = (opts && opts.mode) || 'display';
    const c = Object.assign({}, raw || {});
    const presentation = c.presentation || c.prompt || c.clinical_vignette_summary || c.level_1_presentation || c.front || c.question || '';
    const educational_objective = c.educational_objective || c.answer || c.level_2_three_second_exposure || c.quick_recall || c.back || '';
    const sys = c.sys || c.system || c.subject || '';
    const diagnosis = c.diagnosis || c.dx || c.title || String(educational_objective || presentation || '').slice(0, 80) || '';
    const tags = Array.isArray(c.tags) ? c.tags : (c.tags ? String(c.tags).split(/[|;,]/).map(x => x.trim()).filter(Boolean) : []);

    if (mode === 'export') {
      const out = { card_id: canonicalCardId(raw) };
      if (c.qid != null && c.qid !== '')  out.qid = c.qid;
      if (sys)                             out.sys = sys;
      if (diagnosis)                       out.diagnosis = diagnosis;
      if (presentation)                    out.presentation = presentation;
      if (c.one_thing)                     out.one_thing = c.one_thing;
      if (educational_objective)           out.educational_objective = educational_objective;
      if (c.board_trigger)                 out.board_trigger = c.board_trigger;
      if (c.explanation)                   out.explanation = c.explanation;
      if (c.why_not_others)                out.why_not_others = c.why_not_others;
      if (c.test)                          out.test = c.test;
      if (c.quick_recall)                  out.quick_recall = c.quick_recall;
      if (c.cloze_source_text)             out.cloze_source_text = c.cloze_source_text;
      if (c.cloze_enabled)                 out.cloze_enabled = c.cloze_enabled;
      if (tags.length)                     out.tags = tags;
      return out;
    }

    // mode:'display' — normalize aliases, keep computed views for gameplay rendering
    c.presentation = presentation;
    c.educational_objective = educational_objective;
    c.sys = sys;
    c.system = c.system || sys;
    c.diagnosis = diagnosis;
    c.prompt = presentation;
    c.answer = educational_objective;
    c.quick_recall = c.quick_recall || educational_objective;
    c.tags = tags;
    return c;
  }
