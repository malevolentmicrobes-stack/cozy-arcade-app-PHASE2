<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PROJECT RADAR — Cozy Arcade</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
header{background:#161b22;border-bottom:1px solid #30363d;padding:10px 20px;display:flex;align-items:center;gap:20px;flex-shrink:0}
h1{font-size:15px;font-weight:700;color:#58a6ff;letter-spacing:2px;font-family:monospace}
.tabs{display:flex;gap:4px}
.tab{padding:5px 14px;border:1px solid #30363d;border-radius:6px;background:transparent;color:#8b949e;cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s}
.tab:hover{color:#e6edf3;border-color:#6e7681}
.tab.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
.legend{margin-left:auto;display:flex;gap:14px;font-size:11px;color:#8b949e;align-items:center}
.li{display:flex;align-items:center;gap:5px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.main{flex:1;display:flex;overflow:hidden}
#graph-view{flex:1;overflow:hidden;position:relative;display:flex}
#svg-canvas{width:100%;height:100%;cursor:grab}
#svg-canvas.dragging{cursor:grabbing}
#info-panel{width:300px;background:#161b22;border-left:1px solid #30363d;display:flex;flex-direction:column;transform:translateX(300px);transition:transform .2s ease;flex-shrink:0}
#info-panel.open{transform:translateX(0)}
.ph{padding:14px 16px;border-bottom:1px solid #30363d;display:flex;align-items:center;justify-content:space-between;gap:8px}
.ph .ptitle{font-size:13px;font-weight:600;color:#e6edf3}
.pclose{background:none;border:none;color:#8b949e;cursor:pointer;font-size:20px;line-height:1;padding:0 4px}
.pclose:hover{color:#e6edf3}
.pbody{flex:1;overflow-y:auto;padding:14px}
.ps{margin-bottom:14px}
.ps h3{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#6e7681;margin-bottom:6px}
.ps p{font-size:12px;line-height:1.6;color:#c9d1d9}
.ps ul{list-style:none}
.ps li{font-size:12px;line-height:1.5;padding:3px 0;display:flex;gap:6px;align-items:flex-start;color:#c9d1d9}
.btag{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:700;flex-shrink:0;margin-top:2px}
.btag.active{background:#3d1414;color:#f85149}
.btag.fixed{background:#0d2e0d;color:#3fb950}
.btag.pending{background:#2d2010;color:#e3b341}
.nbadge{font-size:10px;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:10px;font-weight:600}
.loc{font-family:monospace;font-size:11px;color:#8b949e;background:#0d1117;padding:3px 6px;border-radius:4px;display:inline-block;margin-top:2px}
#codex-view,#premortem-view{flex:1;overflow-y:auto;padding:24px;display:none}
.cc{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:18px;margin-bottom:18px}
.cc h2{font-size:13px;font-weight:700;color:#58a6ff;margin-bottom:4px}
.cc .cdesc{font-size:11px;color:#8b949e;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.cc pre{background:#0d1117;border:1px solid #21262d;border-radius:6px;padding:12px;font-size:11px;line-height:1.65;color:#c9d1d9;white-space:pre-wrap;word-break:break-word;font-family:'SF Mono',Consolas,monospace}
.copy-btn{float:right;font-size:10px;padding:3px 10px;border:1px solid #30363d;border-radius:4px;background:transparent;color:#8b949e;cursor:pointer;font-family:inherit;margin-top:-2px}
.copy-btn:hover{color:#e6edf3;border-color:#6e7681}
.copy-btn.copied{color:#3fb950;border-color:#3fb950}
.pm-item{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px;margin-bottom:12px}
.pm-item h3{font-size:12px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.pm-item p{font-size:12px;color:#8b949e;line-height:1.6}
.sev{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700}
.sev.critical{background:#3d1414;color:#f85149}
.sev.high{background:#2d2010;color:#e3b341}
.sev.medium{background:#1a1a2e;color:#bc8cff}
.section-hdr{font-size:16px;font-weight:700;color:#f85149;margin-bottom:16px}
.edge-legend{margin-top:8px;display:flex;gap:12px;flex-wrap:wrap}
.el-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#8b949e}
.el-line{width:24px;height:2px}
</style>
</head>
<body>
<header>
  <h1>⬡ PROJECT RADAR</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('graph',this)">Architecture Graph</button>
    <button class="tab" onclick="switchTab('codex',this)">Codex Prompts</button>
    <button class="tab" onclick="switchTab('premortem',this)">Pre-mortem</button>
  </div>
  <div class="legend">
    <div class="li"><div class="dot" style="background:#f85149"></div>Active Bug</div>
    <div class="li"><div class="dot" style="background:#3fb950"></div>Fixed</div>
    <div class="li"><div class="dot" style="background:#e3b341"></div>Pending</div>
    <div class="li" style="margin-left:8px;gap:10px">
      <div class="edge-legend">
        <div class="el-item"><div class="el-line" style="background:#8b949e"></div>Flow</div>
        <div class="el-item"><div class="el-line" style="background:#3fb950"></div>Fixed</div>
        <div class="el-item"><div class="el-line" style="background:#f85149;height:2px;background:repeating-linear-gradient(90deg,#f85149 0,#f85149 4px,transparent 4px,transparent 7px)"></div>Bug</div>
        <div class="el-item"><div class="el-line" style="background:repeating-linear-gradient(90deg,#bc8cff 0,#bc8cff 3px,transparent 3px,transparent 6px)"></div>State</div>
      </div>
    </div>
  </div>
</header>
<div class="main">
  <div id="graph-view">
    <svg id="svg-canvas">
      <defs>
        <marker id="arr-flow" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#8b949e"/></marker>
        <marker id="arr-bug"  markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#f85149"/></marker>
        <marker id="arr-state" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#bc8cff"/></marker>
        <marker id="arr-fixed" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3z" fill="#3fb950"/></marker>

  <div id="premortem-view"></div>

const EDGES=[
  {f:'home',   t:'solo',    tp:'flow'},
  {f:'home',   t:'domain',  tp:'flow'},
  {f:'home',   t:'shadow',  tp:'flow'},
  {f:'home',   t:'atlas',   tp:'flow'},
  {f:'solo',   t:'promptBox',tp:'flow'},
  {f:'solo',   t:'reveal',  tp:'flow'},
  {f:'solo',   t:'HUD',     tp:'flow'},
  {f:'domain', t:'reveal',  tp:'flow'},
  {f:'shadow', t:'nextCard',tp:'bug'},
  {f:'reveal', t:'ratingBtns',tp:'flow'},
  {f:'reveal', t:'keydowns',tp:'flow'},
  {f:'ratingBtns',t:'rateCard',tp:'flow'},
  {f:'ratingBtns',t:'advance',tp:'flow'},
  {f:'keydowns',t:'advance', tp:'fixed'},
  {f:'advance',t:'rateCard', tp:'fixed'},
  {f:'advance',t:'nextCard', tp:'flow'},
  {f:'rateCard',t:'setProgress',tp:'flow'},
  {f:'nextCard',t:'cardPool',tp:'bug'},
  {f:'dueScore',t:'cardPool',tp:'bug'},
  {f:'sessionPool',t:'cardPool',tp:'flow'},
  {f:'setProgress',t:'phase3State',tp:'state'},
  {f:'setProgress',t:'savePhase3State',tp:'flow'},
  {f:'savePhase3State',t:'legacyToProgress',tp:'fixed'},

  {f:'exportProgressMap',t:'phase3State',tp:'state'},

  {f:'sessionPool',t:'phase3State',tp:'state'},

const ESTYLE={
  flow: {stroke:'#8b949e',dash:'',    w:1.5,marker:'arr-flow'},
  bug:  {stroke:'#f85149',dash:'7,3', w:2,  marker:'arr-bug'},
  state:{stroke:'#bc8cff',dash:'4,3', w:1.5,marker:'arr-state'},
  fixed:{stroke:'#3fb950',dash:'',    w:2,  marker:'arr-fixed'},
};
const TSTYLE={
  comp: {stroke:'#58a6ff',fill:'#0a1929',badge:'#102540',label:'Component'},
  algo: {stroke:'#bc8cff',fill:'#150d26',badge:'#211040',label:'Algorithm'},
  state:{stroke:'#e3b341',fill:'#1c1506',badge:'#2e2208',label:'State'},
  ui:   {stroke:'#3fb950',fill:'#091e09',badge:'#103010',label:'UI'},
  atlas:{stroke:'#f78166',fill:'#200a0a',badge:'#321010',label:'Atlas'},
};
const STATUS_DOT={'bug-active':'#f85149','bug-fixed':'#3fb950','bug-pending':'#e3b341'};

const nodeMap={};
NODES.forEach(n=>nodeMap[n.id]=n);
function cx(n){return n.x+NW/2}
function cy(n){return n.y+NH/2}

// ── GRAPH RENDER ────────────────────────────────────
function renderGraph(){
  const EL=document.getElementById('edges-g');
  const NL=document.getElementById('nodes-g');
  EL.innerHTML='';NL.innerHTML='';
  const SVG_NS='http://www.w3.org/2000/svg';

  function mkEl(tag,attrs){
    const el=document.createElementNS(SVG_NS,tag);
    for(const[k,v]of Object.entries(attrs)) el.setAttribute(k,v);
    return el;
  }

  // Edges — use quadratic bezier for slight curve
  EDGES.forEach(e=>{
    const fn=nodeMap[e.f],tn=nodeMap[e.t];
    if(!fn||!tn)return;
    const s=ESTYLE[e.tp]||ESTYLE.flow;
    const x1=cx(fn),y1=cy(fn),x2=cx(tn),y2=cy(tn);
    const mx=(x1+x2)/2, my=(y1+y2)/2 - 20;
    const path=mkEl('path',{
      d:`M${x1},${y1} Q${mx},${my} ${x2},${y2}`,
      stroke:s.stroke,'stroke-width':s.w,fill:'none',
      'marker-end':`url(#${s.marker})`,
      opacity:'0.55',
    });
    if(s.dash) path.setAttribute('stroke-dasharray',s.dash);
    EL.appendChild(path);
  });

  // Nodes
  NODES.forEach(n=>{
    const ts=TSTYLE[n.type]||TSTYLE.comp;
    const g=mkEl('g',{transform:`translate(${n.x},${n.y})`});
    g.style.cursor='pointer';
    g.addEventListener('click',()=>openPanel(n.id));
    g.addEventListener('mouseenter',()=>{
      rect.setAttribute('opacity','0.9');
      g.setAttribute('transform',`translate(${n.x},${n.y}) scale(1.04)`);
      g.setAttribute('transform-origin',`${NW/2} ${NH/2}`);
    });
    g.addEventListener('mouseleave',()=>{
      rect.setAttribute('opacity','1');
      g.setAttribute('transform',`translate(${n.x},${n.y})`);
    });

    // glow
    const glow=mkEl('rect',{x:3,y:3,width:NW,height:NH,rx:7,fill:ts.stroke,opacity:'0.12'});
    g.appendChild(glow);

    // main rect
    const rect=mkEl('rect',{
      width:NW,height:NH,rx:7,
      fill:ts.fill,stroke:ts.stroke,
      'stroke-width': n.status==='bug-active'?'2.5':'1.5',
    });
    g.appendChild(rect);

    // label
    const txt=mkEl('text',{
      x:NW/2,y:NH/2+4.5,
      'text-anchor':'middle',fill:'#e6edf3',
      'font-size':'11','font-weight':'600',
      'font-family':'-apple-system,BlinkMacSystemFont,monospace',
    });
    txt.textContent=n.label;
    g.appendChild(txt);

    // status dot
    const dc=STATUS_DOT[n.status];
    if(dc){
      if(n.status==='bug-active'){
        const ring=mkEl('circle',{cx:NW-10,cy:10,r:7,fill:'none',stroke:dc,'stroke-width':'1.5',opacity:'0.4'});
        g.appendChild(ring);
      }
      const dot=mkEl('circle',{cx:NW-10,cy:10,r:4.5,fill:dc});
      g.appendChild(dot);
    }

    NL.appendChild(g);
  });
}

// ── PAN / ZOOM ───────────────────────────────────────
let scale=0.78, tx=60, ty=20;
let drag=false, dx=0, dy=0, stx=0, sty=0;
const svgEl=document.getElementById('svg-canvas');
const rootG=document.getElementById('root-g');

function applyT(){rootG.setAttribute('transform',`translate(${tx},${ty}) scale(${scale})`)}

svgEl.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  drag=true;dx=e.clientX;dy=e.clientY;stx=tx;sty=ty;
  svgEl.classList.add('dragging');
});
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  tx=stx+(e.clientX-dx);ty=sty+(e.clientY-dy);applyT();
});
window.addEventListener('mouseup',()=>{drag=false;svgEl.classList.remove('dragging')});
svgEl.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY>0?0.9:1.1;
  scale=Math.min(2.5,Math.max(0.25,scale*f));applyT();
},{passive:false});
applyT();

// ── PANEL ────────────────────────────────────────────
function openPanel(id){
  const n=nodeMap[id];if(!n)return;
  const ts=TSTYLE[n.type];
  document.getElementById('ptitle').textContent=n.label;
  let h=`<span class="nbadge" style="background:${ts.badge};color:${ts.stroke}">${ts.label}</span>`;
  h+=`<div class="ps"><h3>Description</h3><p>${n.desc}</p></div>`;
  if(n.line) h+=`<div class="ps"><h3>Location in index.html</h3><span class="loc">${n.line}</span></div>`;
  if(n.bugs?.length){
    h+='<div class="ps"><h3>Bugs</h3><ul>';
    n.bugs.forEach(b=>{h+=`<li><span class="btag ${b.sev}">${b.id}</span><span>${b.text}</span></li>`});
    h+='</ul></div>';
  }
  if(n.fixes?.length){
    h+='<div class="ps"><h3>Fixes / Planned</h3><ul>';
    n.fixes.forEach(f=>{h+=`<li><span style="color:#3fb950;margin-top:2px">▶</span><span>${f}</span></li>`});
    h+='</ul></div>';
  }
  document.getElementById('pbody').innerHTML=h;
  document.getElementById('info-panel').classList.add('open');
}
function closePanel(){document.getElementById('info-panel').classList.remove('open')}

// ── RENDER CODEX ─────────────────────────────────────
function renderCodex(){
  const v=document.getElementById('codex-view');
  v.innerHTML=CODEX.map((p,i)=>`
    <div class="cc">
      <button class="copy-btn" onclick="copyPrompt(${i},this)">Copy prompt</button>
      <h2>${esc(p.title)}</h2>
      <div class="cdesc">${esc(p.desc)}</div>
      <pre>${esc(p.prompt)}</pre>
    </div>`).join('');
}

function copyPrompt(i,btn){
  navigator.clipboard.writeText(CODEX[i].prompt).then(()=>{
    btn.textContent='Copied!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy prompt';btn.classList.remove('copied')},2000);
  });
}

function renderPremortem(){
  const v=document.getElementById('premortem-view');
  v.innerHTML=`<div class="section-hdr">⚠ Pre-mortem Analysis</div>`+
    PREMORTEM.map(p=>`
    <div class="pm-item">
      <h3>${esc(p.title)}<span class="sev ${p.sev}">${p.sev}</span></h3>
      <p>${esc(p.body)}</p>
    </div>`).join('');
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('graph-view').style.display=tab==='graph'?'flex':'none';
  document.getElementById('info-panel').style.display=tab==='graph'?'flex':'none';
  document.getElementById('codex-view').style.display=tab==='codex'?'block':'none';
  document.getElementById('premortem-view').style.display=tab==='premortem'?'block':'none';
}
